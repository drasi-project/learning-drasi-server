name: Release Tutorials Bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish to (for example: v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release-tutorials:
    name: Release Tutorials Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Create tutorials archive
        id: archive
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          ARCHIVE="drasi-tutorials-${TAG}.zip"

          zip -r "$ARCHIVE" tutorials/ \
            -x 'tutorials/**/target/*'

          echo "file=$ARCHIVE" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          ARCHIVE="${{ steps.archive.outputs.file }}"

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Uploading updated tutorials bundle..."
            gh release upload "$TAG" "$ARCHIVE" \
              --repo "${{ github.repository }}" \
              --clobber
          else
            echo "Creating release $TAG with tutorials bundle..."
            gh release create "$TAG" "$ARCHIVE" \
              --repo "${{ github.repository }}" \
              --title "Release $TAG" \
              --generate-notes
          fi

      - name: Update summary
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          ARCHIVE="${{ steps.archive.outputs.file }}"

          {
            echo ""
            echo "## Tutorials Release Published"
            echo ""
            echo "- Tag: [$TAG](https://github.com/${{ github.repository }}/releases/tag/$TAG)"
            echo "- Asset: $ARCHIVE"
          } >> "$GITHUB_STEP_SUMMARY"
