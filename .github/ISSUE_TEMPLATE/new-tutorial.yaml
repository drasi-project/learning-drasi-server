name: New tutorial or improvement
description: Suggest a new tutorial or an improvement to an existing one.
title: "[idea] <short summary>"
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the tutorial or improvement and the scenario it demonstrates.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why is it valuable?
      description: Who would benefit and what would they learn?
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: Sources, queries, reactions, or sample data the tutorial might use.
    validations:
      required: false
