services:
  drasi-server:
    image: ghcr.io/drasi-project/drasi-server:latest
    ports:
      - "8080:8080"
    volumes:
      # Mount this tutorial's configuration into the container.
      - ./config:/app/config
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/config/server.yaml"]
