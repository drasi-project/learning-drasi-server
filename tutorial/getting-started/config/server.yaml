apiVersion: drasi.io/v1
host: 0.0.0.0
port: 8080
logLevel: info
enableUi: true

# A mock source that generates simulated sensor readings.
# Each sensor emits an INSERT on its first reading and UPDATEs thereafter.
sources:
  - kind: mock
    id: sensor-feed
    autoStart: true
    dataType:
      type: sensorReading
      sensorCount: 5
    intervalMs: 3000

# A continuous query that keeps a live result set of readings above 25 degrees.
queries:
  - id: high-temp
    query: "MATCH (s:SensorReading) WHERE s.temperature > 25 RETURN s"
    queryLanguage: Cypher
    sources:
      - sourceId: sensor-feed
    autoStart: true

# A reaction that logs every change to the high-temp query results.
reactions:
  - kind: log
    id: temp-logger
    queries:
      - high-temp
    autoStart: true
