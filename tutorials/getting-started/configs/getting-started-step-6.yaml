# Drasi Server Configuration
#
# Edit this file to customize your configuration.

id: ccc77569-0c72-4865-ac2b-3cde1ef03d8d
host: 0.0.0.0
port: 8080
logLevel: info
persistConfig: true
persistIndex: false
autoInstallPlugins: true
plugins:
- ref: source/postgres
- ref: bootstrap/postgres
- ref: reaction/log
sources:
- kind: postgres
  id: my-postgres
  autoStart: true
  bootstrapProvider:
    kind: postgres
  host:
    kind: EnvironmentVariable
    name: DB_HOST
    default: localhost
  port: 5432
  database: getting_started
  user: drasi_user
  password: drasi_password
  tables:
  - Message
  slotName: drasi_slot
  publicationName: drasi_pub
  sslMode: prefer
  tableKeys:
  - table: Message
    keyColumns:
    - MessageId
queries:
- id: all-messages
  autoStart: true
  query: |
    MATCH (m:Message)
    RETURN m.MessageId AS MessageId, m.From AS From, m.Message AS Message
  queryLanguage: GQL
  middleware: []
  sources:
  - sourceId: my-postgres
    nodes: []
    relations: []
    pipeline: []
  enableBootstrap: true
  bootstrapBufferSize: 10000
- id: hello-world-senders
  autoStart: true
  query: MATCH (m:Message) WHERE m.Message = 'Hello World' RETURN m.MessageId AS Id, m.From AS Sender
  queryLanguage: Cypher
  middleware: []
  sources:
  - sourceId: my-postgres
    nodes: []
    relations: []
    pipeline: []
  enableBootstrap: true
  bootstrapBufferSize: 10000
- id: message-counts
  autoStart: true
  query: MATCH (m:Message) RETURN m.Message AS MessageText, count(m) AS Count
  queryLanguage: Cypher
  middleware: []
  sources:
  - sourceId: my-postgres
    nodes: []
    relations: []
    pipeline: []
  enableBootstrap: true
  bootstrapBufferSize: 10000
- id: inactive-senders
  autoStart: true
  query: 'MATCH (m:Message) WITH m.From AS MessageFrom, max(drasi.changeDateTime(m)) AS LastMessageTimestamp WHERE LastMessageTimestamp <= datetime.realtime() - duration({ seconds: 20 }) OR drasi.trueLater(LastMessageTimestamp <= datetime.realtime() - duration({ seconds: 20 }), LastMessageTimestamp + duration({ seconds: 20 })) RETURN MessageFrom, LastMessageTimestamp'
  queryLanguage: Cypher
  middleware: []
  sources:
  - sourceId: my-postgres
    nodes: []
    relations: []
    pipeline: []
  enableBootstrap: true
  bootstrapBufferSize: 10000
reactions:
- kind: log
  id: log-reaction
  queries:
  - all-messages
  - hello-world-senders
  autoStart: true
  routes: {}
instances: []
