# Two demo Pods running the sample "my-app" image at different tags. The
# container name is "app" in both, so `kubectl set image pod/<name> app=<image>`
# upgrades a single Pod later in the tutorial.
#
#   my-app-1 -> ghcr.io/drasi-project/my-app:0.1  (flagged by the seeded RiskyImage)
#   my-app-2 -> ghcr.io/drasi-project/my-app:0.2  (flagged after you add it to RiskyImage)
apiVersion: v1
kind: Pod
metadata:
  name: my-app-1
  namespace: default
  labels:
    app: my-app
    instance: my-app-1
spec:
  containers:
    - name: app
      image: ghcr.io/drasi-project/my-app:0.1
      imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Pod
metadata:
  name: my-app-2
  namespace: default
  labels:
    app: my-app
    instance: my-app-2
spec:
  containers:
    - name: app
      image: ghcr.io/drasi-project/my-app:0.2
      imagePullPolicy: IfNotPresent
