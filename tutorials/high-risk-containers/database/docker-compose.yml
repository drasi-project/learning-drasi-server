name: high-risk-containers

services:
  postgres:
    image: postgres:14-alpine
    container_name: high-risk-containers-postgres
    environment:
      POSTGRES_DB: high_risk_containers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    ports:
      - "${POSTGRES_HOST_PORT:-5732}:5432"
    volumes:
      - high_risk_containers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d high_risk_containers"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  high_risk_containers_postgres_data:
