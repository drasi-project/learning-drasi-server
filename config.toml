# Hugo Modules: Docsy theme + content mounts
[module]
  [module.hugoVersion]
    extended = true
    min = "0.152.2"

  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

  # Default content mount (kept so files under content/ render normally).
  [[module.mounts]]
    source = "content"
    target = "content"

  # Single source of truth: render the tutorial authored under tutorials/
  # directly, without copying it into content/.
  [[module.mounts]]
    source = "tutorials/getting-started"
    target = "content/tutorials/getting-started"
    # The interactive viewer is a runtime helper (served by scripts/open-viewer.sh),
    # not documentation; keep its raw index.html out of the content mount so Hugo's
    # text/html content policy doesn't reject it.
    excludeFiles = "viewer/**"

  [[module.mounts]]
    source = "tutorials/curbside-pickup"
    target = "content/tutorials/curbside-pickup"
    # The Node.js operations console (tui/) is application code, not docs; its
    # node_modules can contain raw .html that Hugo's text/html content policy
    # rejects, so keep the whole directory out of the content mount.
    excludeFiles = "tui/**"

  # Keep default mounts for the remaining components.
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

# UI Customization
[params]
  # GitHub repository for "Edit this page" links
  github_repo = "https://github.com/drasi-project/learning-drasi-server"
  github_branch = "main"
  custom_js = ["js/sync-tabs.js", "js/navigation-enhancements.js"]

[params.ui]
  sidebar_menu_compact = false
  sidebar_search_disable = true
  sidebar_menu_foldable = true
  sidebar_menu_truncate = 100
  ul_show = 1
  navbar_logo = true

  # Enable the light/dark mode toggle menu in the navbar
  showLightDarkModeMenu = true

  # Show reading time on documentation pages
  [params.ui.readingtime]
    enable = true

# Feedback widget - "Was this page helpful?"
[params.ui.feedback]
  enable = false

# Enable git-based last modified date detection
[frontmatter]
  lastmod = [":git", "lastmod", "date", "publishDate"]
